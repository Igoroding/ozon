<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon — РнП Стольников</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geologica:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --s1: #0d1117; --s2: #111820; --border: #1a2333;
    --oz: #005bff; --green: #05d69e; --yellow: #ffc442; --red: #ff4f6e; --blue: #3b9eff;
    --text: #dde4ee; --muted: #4a5568; --muted2: #718096;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Geologica',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,91,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,91,255,0.03) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }
  .wrap { position:relative; z-index:1; max-width:1360px; margin:0 auto; padding:24px; }

  /* Header */
  .site-header { background:#0d1117; border-bottom:1px solid #1a2333; padding:14px 28px 0; font-family:'Geologica',system-ui,sans-serif; }
  .site-header-top { display:flex; align-items:center; gap:14px; padding-bottom:12px; }
  .sh-logo { width:44px; height:44px; background:var(--oz); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; color:#fff; box-shadow:0 0 24px rgba(0,91,255,0.3); flex-shrink:0; letter-spacing:0; }
  .sh-name { font-size:22px; font-weight:800; letter-spacing:2px; color:#dde4ee; line-height:1.1; text-transform:uppercase; }
  .sh-sub  { font-size:11px; color:#4a5568; letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }

  /* Month tabs */
  .month-tabs { display:flex; gap:6px; margin-bottom:24px; flex-wrap:wrap; }
  .month-tab { padding:7px 18px; background:var(--s1); border:1px solid var(--border); border-radius:8px; font-size:13px; font-weight:600; color:var(--muted2); cursor:pointer; transition:all .2s; }
  .month-tab.active { background:var(--oz); border-color:var(--oz); color:#fff; }
  .month-tab:hover:not(.active) { color:var(--text); border-color:var(--muted); }

  /* Plan editor */
  .plan-bar { background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:18px 24px; margin-bottom:24px; display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
  .plan-bar h3 { font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted2); margin-right:8px; }
  .plan-field { display:flex; flex-direction:column; gap:4px; }
  .plan-field label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .plan-field input { background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:7px 12px; color:var(--text); font-size:14px; font-weight:700; width:160px; font-family:'Geologica',sans-serif; }
  .plan-field input:focus { outline:none; border-color:var(--oz); }
  .plan-field .computed { font-size:13px; font-weight:700; color:var(--yellow); padding:7px 12px; }
  .plan-save { margin-left:auto; background:var(--oz); border:none; border-radius:8px; padding:9px 20px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:'Geologica',sans-serif; transition:opacity .2s; }
  .plan-save:hover { opacity:0.85; }
  .plan-saved { font-size:12px; color:var(--green); margin-left:8px; opacity:0; transition:opacity .3s; }

  /* Tempo cards */
  .tempo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
  .tempo-card { background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:20px 22px; }
  .tempo-card .tc-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted2); margin-bottom:10px; }
  .tempo-card .tc-fact { font-family:'Bebas Neue'; font-size:36px; letter-spacing:1px; line-height:1; }
  .tempo-card .tc-plan { font-size:12px; color:var(--muted2); margin-top:4px; }
  .tempo-card .tc-pct { font-size:13px; font-weight:700; margin-top:8px; }
  .progress { height:5px; background:var(--border); border-radius:3px; margin-top:10px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; transition:width .8s ease; }
  .tempo-card .tc-tempo { margin-top:10px; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:700; }
  .tempo-ok   { background:rgba(5,214,158,0.12); color:var(--green); border:1px solid rgba(5,214,158,0.2); }
  .tempo-warn { background:rgba(255,196,66,0.12); color:var(--yellow); border:1px solid rgba(255,196,66,0.2); }
  .tempo-bad  { background:rgba(255,79,110,0.12); color:var(--red); border:1px solid rgba(255,79,110,0.2); }

  /* View toggle */
  .view-toggle { display:flex; gap:6px; margin-bottom:16px; }
  .vt { padding:7px 18px; background:var(--s1); border:1px solid var(--border); border-radius:8px; font-size:13px; font-weight:600; color:var(--muted2); cursor:pointer; transition:all .2s; }
  .vt.active { background:var(--s2); border-color:var(--muted); color:var(--text); }

  /* Chart */
  .chart-wrap { background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:24px; }
  .chart-title { font-size:13px; font-weight:700; color:var(--muted2); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px; }
  .chart-legend { display:flex; gap:20px; margin-bottom:16px; }
  .chart-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted2); }
  .chart-legend-dot { width:10px; height:10px; border-radius:50%; }
  .chart-area { position:relative; height:280px; }

  /* Table */
  .tbl-wrap { background:var(--s1); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:24px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:var(--s2); padding:12px 16px; text-align:left; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted2); border-bottom:1px solid var(--border); }
  th:not(:first-child) { text-align:right; }
  td { padding:11px 16px; border-bottom:1px solid rgba(26,35,51,0.7); }
  td:not(:first-child) { text-align:right; font-weight:600; }
  tr:last-child td { border-bottom:none; }
  tr.today-row td { background:rgba(0,91,255,0.06); }
  tr:hover td { background:var(--s2); }
  .td-date { color:var(--muted2); font-weight:500; }
  .td-today-badge { background:var(--oz); color:#fff; font-size:10px; padding:1px 6px; border-radius:4px; margin-left:6px; }

  /* AI Analysis */
  .ai-wrap { background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:24px; }
  .ai-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .ai-title { font-size:13px; font-weight:700; color:var(--muted2); text-transform:uppercase; letter-spacing:1px; }
  .ai-btn { background:var(--oz); border:none; border-radius:8px; padding:9px 20px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:'Geologica',sans-serif; transition:opacity .2s; display:flex; align-items:center; gap:8px; }
  .ai-btn:hover { opacity:0.85; }
  .ai-btn:disabled { opacity:0.5; cursor:default; }
  .ai-body { font-size:14px; line-height:1.7; color:var(--text); }
  .ai-body.empty { color:var(--muted2); font-size:13px; }

  /* AI Chat */
  .ai-chat { display:flex; flex-direction:column; gap:12px; }
  .ai-bubble { display:flex; gap:10px; align-items:flex-start; }
  .ai-bubble.user { flex-direction:row-reverse; }
  .ai-bubble-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:2px; }
  .ai-bubble.bot .ai-bubble-avatar { background:var(--oz); }
  .ai-bubble.user .ai-bubble-avatar { background:var(--s2); border:1px solid var(--border); }
  .ai-bubble-text { max-width:88%; padding:10px 14px; border-radius:12px; font-size:13.5px; line-height:1.65; }
  .ai-bubble.bot .ai-bubble-text { background:var(--s2); color:var(--text); border-radius:4px 12px 12px 12px; }
  .ai-bubble.user .ai-bubble-text { background:var(--oz); color:#fff; border-radius:12px 4px 12px 12px; opacity:0.92; }
  .ai-bubble.typing .ai-bubble-text { color:var(--muted2); font-style:italic; }
  .ai-followup { display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
  .ai-followup-input { flex:1; background:var(--s2); border:1px solid var(--border); border-radius:8px; padding:9px 14px; color:var(--text); font-size:13px; font-family:'Geologica',sans-serif; }
  .ai-followup-input:focus { outline:none; border-color:var(--oz); }
  .ai-followup-input::placeholder { color:var(--muted2); }
  .ai-followup-btn { background:var(--oz); border:none; border-radius:8px; padding:9px 16px; color:#fff; font-size:18px; cursor:pointer; transition:opacity .2s; line-height:1; }
  .ai-followup-btn:hover { opacity:0.85; }
  .ai-followup-btn:disabled { opacity:0.4; cursor:default; }
  .ai-suggestions { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .ai-suggestion-chip { background:var(--s2); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:12px; color:var(--muted2); cursor:pointer; font-family:'Geologica',sans-serif; transition:all .2s; white-space:nowrap; }
  .ai-suggestion-chip:hover { border-color:var(--oz); color:var(--text); background:var(--s1); }

  .loading { text-align:center; padding:60px; color:var(--muted2); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--oz); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg) } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- Header -->
<div class="site-header">
  <div class="site-header-top">
    <div class="sh-logo">OZON</div>
    <div>
      <div class="sh-name">Ozon Analytics</div>
      <div class="sh-sub">Стольников</div>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="loading" class="loading"><div class="spinner"></div>Загружаем данные...</div>
  <div id="app" style="display:none">

    <!-- Month tabs -->
    <div class="month-tabs" id="month-tabs"></div>

    <!-- Plan editor -->
    <div class="plan-bar">
      <h3>📋 План</h3>
      <div class="plan-field">
        <label>Заказы (₽)</label>
        <input type="number" id="plan-orders" placeholder="0">
      </div>
      <div class="plan-field">
        <label>Продажи (₽)</label>
        <input type="number" id="plan-sales" placeholder="0">
      </div>
      <div class="plan-field">
        <label>ДРР (%)</label>
        <input type="number" id="plan-drr" placeholder="10" step="0.1" style="width:90px">
      </div>
      <div class="plan-field">
        <label>Рекл. бюджет (₽)</label>
        <div class="computed" id="plan-ads-computed">—</div>
      </div>
      <button class="plan-save" onclick="savePlan()">Сохранить</button>
      <span class="plan-saved" id="plan-saved">✓ Сохранено</span>
    </div>

    <!-- Tempo -->
    <div class="tempo-grid" id="tempo-grid"></div>

    <!-- Toggle -->
    <div class="view-toggle">
      <div class="vt" onclick="setView('table',this)">📋 Таблица</div>
      <div class="vt active" onclick="setView('chart',this)">📈 График</div>
    </div>

    <!-- Chart -->
    <div class="chart-wrap" id="chart-wrap">
      <div class="chart-title">Динамика за месяц</div>
      <div class="chart-legend">
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:#005bff"></div>Заказы ₽</div>
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:#05d69e"></div>Продажи ₽</div>
        <div class="chart-legend-item"><div class="chart-legend-dot" style="background:#ffc442"></div>Реклама ₽</div>
      </div>
      <div class="chart-area" id="chart-area"><canvas id="myChart"></canvas></div>
    </div>

    <!-- Table -->
    <div class="tbl-wrap" id="tbl-wrap" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Дата</th>
            <th>Заказы шт</th><th>Заказы ₽</th>
            <th>Продажи шт</th><th>Продажи ₽</th>
            <th>Реклама ₽</th><th>ДРР</th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>

    <!-- AI Analysis -->
    <div class="ai-wrap">
      <div class="ai-header">
        <div class="ai-title">🤖 ИИ-анализ</div>
        <button class="ai-btn" id="ai-btn" onclick="runAI()">✨ Запустить анализ</button>
      </div>
      <div class="ai-body empty" id="ai-body">Нажмите кнопку, чтобы получить анализ данных за последние 14 дней</div>
      <div class="ai-followup" id="ai-followup" style="display:none;">
        <input type="text" id="ai-followup-input" class="ai-followup-input" placeholder="Уточнить или спросить AI...">
        <button id="ai-followup-btn" class="ai-followup-btn" onclick="sendFollowUp()">➤</button>
      </div>
    </div>

  </div><!-- /app -->
</div>

<script>
const SUPABASE_URL = 'https://gfwznqfbhrwpsvrpscbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmd3pucWZiaHJ3cHN2cnBzY2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzEyMjcsImV4cCI6MjA4OTg0NzIyN30.cKI4cIgHRmkt57CioFB32LA3zTggQdLqlYtzZxyJezU';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };
const WEBHOOK_URL = 'https://wbtrenz.app.n8n.cloud/webhook/wb-ai-v7';

let currentMonth = '';
let plan = { orders_plan: 0, sales_plan: 0, drr_plan: 10 };
let aiMessages = [];
let currentView = 'chart';

const fmtRub = n => new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' ₽';
const fmtN   = n => new Intl.NumberFormat('ru-RU').format(Math.round(n));
const fmtPct = n => (n || 0).toFixed(1) + '%';

async function sbGet(path) {
  const r = await fetch(SUPABASE_URL + path, { headers: SB_HEADERS });
  return r.json();
}
async function sbPost(path, body) {
  return fetch(SUPABASE_URL + path, {
    method: 'POST',
    headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(body)
  });
}

function getMonths() {
  const months = [];
  const now = new Date();
  for (let i = 0; i < 4; i++) {
    const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const my = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, '0');
    months.push(`${my}-${mm}`);
  }
  return months;
}

function fmtMonthLabel(m) {
  const [y, mo] = m.split('-');
  const names = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  return names[parseInt(mo) - 1] + ' ' + y;
}

async function loadPlan(month) {
  const rows = await sbGet(`/rest/v1/ozon_plan?month=eq.${month}&limit=1`);
  if (rows && rows.length > 0) {
    plan = rows[0];
  } else {
    plan = { month, orders_plan: 0, sales_plan: 0, drr_plan: 10 };
  }
  document.getElementById('plan-orders').value = plan.orders_plan || '';
  document.getElementById('plan-sales').value  = plan.sales_plan  || '';
  document.getElementById('plan-drr').value    = plan.drr_plan    || 10;
  updateAdsComputed();
}

function updateAdsComputed() {
  const sales = parseFloat(document.getElementById('plan-sales').value) || 0;
  const drr   = parseFloat(document.getElementById('plan-drr').value)   || 0;
  const ads   = Math.round(sales * drr / 100);
  document.getElementById('plan-ads-computed').textContent = ads > 0 ? fmtRub(ads) : '—';
}
document.getElementById('plan-sales').addEventListener('input', updateAdsComputed);
document.getElementById('plan-drr').addEventListener('input', updateAdsComputed);

async function savePlan() {
  const body = {
    month: currentMonth,
    orders_plan: parseFloat(document.getElementById('plan-orders').value) || 0,
    sales_plan:  parseFloat(document.getElementById('plan-sales').value)  || 0,
    drr_plan:    parseFloat(document.getElementById('plan-drr').value)    || 10,
    updated_at:  new Date().toISOString()
  };
  await sbPost('/rest/v1/ozon_plan?on_conflict=month', body);
  plan = body;
  const s = document.getElementById('plan-saved');
  s.style.opacity = 1;
  setTimeout(() => s.style.opacity = 0, 2000);
  renderTempo(window._rows || []);
}

async function loadData(month) {
  const [y, m] = month.split('-');
  const from = `${month}-01`;
  const lastDay = new Date(parseInt(y), parseInt(m), 0).getDate();
  const to = `${month}-${String(lastDay).padStart(2,'0')}`;
  const rows = await sbGet(`/rest/v1/ozon_rnp?date=gte.${from}&date=lte.${to}&shop=eq.stolnikov&order=date.asc&limit=200`);
  return rows || [];
}

function renderTempo(rows) {
  const today = new Date().toISOString().slice(0, 10);
  const [y, m] = currentMonth.split('-');
  const totalDays  = new Date(parseInt(y), parseInt(m), 0).getDate();
  const completedRows = rows.filter(r => r.date < today);
  const passedDays = completedRows.length || 1;

  const factOrders = completedRows.reduce((s,r) => s + (r.orders_sum||0), 0);
  const factSales  = completedRows.reduce((s,r) => s + (r.sales_sum||0), 0);
  const factAds    = completedRows.reduce((s,r) => s + (r.ads_spend||0), 0);

  const planOrders = plan.orders_plan || 1;
  const planSales  = plan.sales_plan  || 1;
  const planDrr    = plan.drr_plan    || 10;

  const tempoOrders = totalDays > 0 ? (factOrders / passedDays) * totalDays : 0;
  const tempoSales  = totalDays > 0 ? (factSales  / passedDays) * totalDays : 0;

  const pctOrders = planOrders > 0 ? factOrders / planOrders * 100 : 0;
  const pctSales  = planSales  > 0 ? factSales  / planSales  * 100 : 0;
  const factDrr   = factOrders > 0 ? factAds / factOrders * 100 : 0;

  function colorByTempo(tempo, planVal) {
    const ratio = planVal > 0 ? tempo / planVal : 0;
    if (ratio >= 0.95) return 'var(--green)';
    if (ratio >= 0.7)  return 'var(--yellow)';
    return 'var(--red)';
  }
  function tempoClass(tempo, planVal, inverse=false) {
    const ratio = planVal > 0 ? tempo / planVal : 0;
    if (inverse) {
      if (ratio <= 1.0)  return 'tempo-ok';
      if (ratio <= 1.10) return 'tempo-warn';
      return 'tempo-bad';
    }
    if (ratio >= 0.95) return 'tempo-ok';
    if (ratio >= 0.7)  return 'tempo-warn';
    return 'tempo-bad';
  }
  function tempoText(tempo, planVal) {
    const ratio = planVal > 0 ? tempo / planVal * 100 : 0;
    return `Идём на ${ratio.toFixed(0)}% плана`;
  }
  function colorAds(drrFact, drrPlan) {
    if (drrFact <= drrPlan)        return 'var(--green)';
    if (drrFact <= drrPlan * 1.10) return 'var(--yellow)';
    return 'var(--red)';
  }
  const adsColor = colorAds(factDrr, planDrr);
  const adsTempoClass = factDrr <= planDrr ? 'tempo-ok' : factDrr <= planDrr * 1.10 ? 'tempo-warn' : 'tempo-bad';

  const cards = [
    { label:'Заказы',  fact:fmtRub(factOrders), planLabel:'план: '+fmtRub(planOrders), barW:Math.min(pctOrders,100), barColor:colorByTempo(tempoOrders,planOrders), pctLabel:fmtPct(pctOrders)+' выполнено', tempoClass:tempoClass(tempoOrders,planOrders), tempoLabel:tempoText(tempoOrders,planOrders) },
    { label:'Продажи', fact:fmtRub(factSales),  planLabel:'план: '+fmtRub(planSales),  barW:Math.min(pctSales,100),  barColor:colorByTempo(tempoSales,planSales),   pctLabel:fmtPct(pctSales)+' выполнено',  tempoClass:tempoClass(tempoSales,planSales), tempoLabel:tempoText(tempoSales,planSales) },
    { label:'Реклама', fact:fmtRub(factAds),    planLabel:'план ДРР: '+planDrr+'%',    barW:Math.min(factDrr/planDrr*100,200)/2, barColor:adsColor, pctLabel:'ДРР: '+fmtPct(factDrr), tempoClass:adsTempoClass, tempoLabel:'факт '+fmtPct(factDrr)+' / план '+planDrr+'%' },
  ];

  document.getElementById('tempo-grid').innerHTML = cards.map(c => `
    <div class="tempo-card">
      <div class="tc-label">${c.label}</div>
      <div class="tc-fact" style="color:var(--text)">${c.fact}</div>
      <div class="tc-plan">${c.planLabel}</div>
      <div class="progress"><div class="progress-fill" style="width:${c.barW}%;background:${c.barColor}"></div></div>
      <div class="tc-pct" style="color:${c.barColor}">${c.pctLabel}</div>
      <div class="tc-tempo ${c.tempoClass}">${c.tempoLabel}</div>
    </div>
  `).join('');
}

function renderChart(rows) {
  const labels = rows.map(r => {
    const d = new Date(r.date + 'T12:00:00');
    return d.toLocaleDateString('ru-RU', {day:'2-digit', month:'short'}).replace(' ', '\u00a0');
  });
  function fmtAxis(v) {
    if (v >= 1000000) return (v/1000000).toFixed(1).replace('.0','') + 'М';
    if (v >= 1000)    return Math.round(v/1000) + 'К';
    return String(v);
  }
  const canvas = document.getElementById('myChart');
  if (window._chartInstance) { window._chartInstance.destroy(); }
  window._chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'Заказы ₽',  data:rows.map(r=>r.orders_sum||0),  borderColor:'#005bff', backgroundColor:'rgba(0,91,255,0.08)',   pointBackgroundColor:'#005bff', pointRadius:5, pointHoverRadius:7, tension:0.4, fill:false, borderWidth:2.5 },
        { label:'Продажи ₽', data:rows.map(r=>r.sales_sum||0),   borderColor:'#05d69e', backgroundColor:'rgba(5,214,158,0.08)',  pointBackgroundColor:'#05d69e', pointRadius:5, pointHoverRadius:7, tension:0.4, fill:false, borderWidth:2.5 },
        { label:'Реклама ₽', data:rows.map(r=>r.ads_spend||0),   borderColor:'#ffc442', backgroundColor:'rgba(255,196,66,0.08)', pointBackgroundColor:'#ffc442', pointRadius:5, pointHoverRadius:7, tension:0.4, fill:false, borderWidth:2.5 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: {
        legend:{ display:false },
        tooltip:{ backgroundColor:'#1e2a3a', borderColor:'#2a3a4a', borderWidth:1, titleColor:'#dde4ee', bodyColor:'#a0aec0', padding:12,
          callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('ru-RU')} ₽` }
        }
      },
      scales: {
        x:{ grid:{color:'#1a2333',lineWidth:1}, ticks:{color:'#6b7a90',font:{family:"'Geologica',system-ui,sans-serif",size:12},maxRotation:0}, border:{color:'#2a3a4a'} },
        y:{ grid:{color:'#1a2333',lineWidth:1}, ticks:{color:'#6b7a90',font:{family:"'Geologica',system-ui,sans-serif",size:12},callback:v=>fmtAxis(v),maxTicksLimit:6}, border:{color:'#2a3a4a'} }
      }
    }
  });
}

function renderTable(rows) {
  const today = new Date().toLocaleDateString('sv-SE');
  const filtered = [...rows].reverse();
  document.getElementById('tbl-body').innerHTML = filtered.map(r => {
    const drr = r.orders_sum > 0 ? (r.ads_spend / r.orders_sum * 100) : 0;
    const isToday = r.date === today;
    const d = new Date(r.date + 'T12:00:00');
    const label = d.toLocaleDateString('ru-RU', {day:'2-digit', month:'short'});
    return `<tr class="${isToday ? 'today-row' : ''}">
      <td class="td-date">${label}${isToday ? '<span class="td-today-badge">сегодня</span>' : ''}</td>
      <td>${fmtN(r.orders_count||0)}</td>
      <td>${fmtRub(r.orders_sum||0)}</td>
      <td>${fmtN(r.sales_count||0)}</td>
      <td>${fmtRub(r.sales_sum||0)}</td>
      <td>${fmtRub(r.ads_spend||0)}</td>
      <td style="color:${drr > (plan.drr_plan||10) ? 'var(--red)' : 'var(--green)'}">${fmtPct(drr)}</td>
    </tr>`;
  }).join('');
}

function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.vt').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('chart-wrap').style.display = v === 'chart' ? 'block' : 'none';
  document.getElementById('tbl-wrap').style.display   = v === 'table'  ? 'block' : 'none';
}

async function switchMonth(month) {
  currentMonth = month;
  document.querySelectorAll('.month-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.month === month);
  });
  document.getElementById('loading').style.display = 'block';
  document.getElementById('app').style.display = 'none';

  await loadPlan(month);
  const rows = await loadData(month);
  window._rows = rows;

  renderTempo(rows);
  const todayStr = new Date().toLocaleDateString('sv-SE');
  renderChart(rows.filter(r => r.date !== todayStr));
  renderTable(rows);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// Init
const months = getMonths();
document.getElementById('month-tabs').innerHTML = months.map(m =>
  `<div class="month-tab" data-month="${m}" onclick="switchMonth('${m}')">${fmtMonthLabel(m)}</div>`
).join('');
const thisMonth = new Date().toISOString().slice(0, 7);
switchMonth(thisMonth);

// ─── AI ────────────────────────────────────────────────────

function parseAISuggestions(text) {
  const match = text.match(/\[ВОПРОСЫ:\s*([^\]]+)\]/);
  if (!match) return { clean: text, suggestions: [] };
  const suggestions = match[1].split('|').map(s => s.trim()).filter(Boolean);
  const clean = text.replace(match[0], '').trim();
  return { clean, suggestions };
}

function useSuggestion(btn) {
  document.getElementById('ai-followup-input').value = btn.textContent;
  sendFollowUp();
}

function renderChat() {
  const body = document.getElementById('ai-body');
  if (aiMessages.length === 0) {
    body.className = 'ai-body empty';
    body.textContent = 'Нажмите кнопку, чтобы получить анализ данных за последние 14 дней';
    document.getElementById('ai-followup').style.display = 'none';
    return;
  }
  body.className = 'ai-body';
  const chatMsgs = aiMessages.filter((m, i) => m.role !== 'system' && !(i === 0 && m.role === 'user'));
  let lastSuggestions = [];
  const bubbles = chatMsgs.map((m, idx) => {
    const isBot = m.role === 'assistant';
    const isTyping = m.typing === true;
    const isLast = idx === chatMsgs.length - 1;
    let displayContent = m.content;
    if (isBot && !isTyping) {
      const parsed = parseAISuggestions(m.content);
      displayContent = parsed.clean;
      if (isLast) lastSuggestions = parsed.suggestions;
    }
    return `<div class="ai-bubble ${isBot ? 'bot' : 'user'}${isTyping ? ' typing' : ''}">
      <div class="ai-bubble-avatar">${isBot ? '🤖' : '👤'}</div>
      <div class="ai-bubble-text">${isBot ? displayContent : m.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`;
  }).join('');

  const chipsHtml = lastSuggestions.length > 0
    ? `<div class="ai-suggestions">${lastSuggestions.map(q =>
        `<button class="ai-suggestion-chip" onclick="useSuggestion(this)">${q}</button>`
      ).join('')}</div>`
    : '';

  body.innerHTML = '<div class="ai-chat">' + bubbles + '</div>' + chipsHtml;
  const hasReply = chatMsgs.some(m => m.role === 'assistant' && !m.typing);
  document.getElementById('ai-followup').style.display = hasReply ? 'flex' : 'none';
}

async function callWebhook(messages) {
  const resp = await fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages })
  });
  const raw = await resp.text();
  if (!raw || !raw.trim()) throw new Error('Webhook вернул пустой ответ.');
  let data;
  try { data = JSON.parse(raw); } catch(e) { throw new Error('Ответ не JSON: ' + raw.slice(0, 200)); }
  return data.result || JSON.stringify(data);
}

async function runAI() {
  const btn = document.getElementById('ai-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Анализирую...';

  aiMessages = [];
  document.getElementById('ai-followup').style.display = 'none';
  const body = document.getElementById('ai-body');
  body.className = 'ai-body empty';
  body.textContent = 'Загружаю данные за 14 дней...';

  const today = new Date().toLocaleDateString('sv-SE');
  const from14 = new Date(Date.now() - 14 * 86400000).toLocaleDateString('sv-SE');
  let ai14rows = [];
  try {
    ai14rows = await sbGet(`/rest/v1/ozon_rnp?date=gte.${from14}&date=lt.${today}&shop=eq.stolnikov&order=date.asc&limit=200`) || [];
  } catch(e) {}

  if (ai14rows.length === 0) {
    body.textContent = 'Нет данных для анализа.';
    btn.disabled = false;
    btn.textContent = '✨ Запустить анализ';
    return;
  }

  body.textContent = `Получено ${ai14rows.length} дней. Отправляю на анализ...`;

  const tableText = ai14rows.map(r => {
    const d = new Date(r.date + 'T12:00:00');
    const day = d.toLocaleDateString('ru-RU', {weekday:'short', day:'2-digit', month:'short'});
    const drr = r.orders_sum > 0 ? (r.ads_spend / r.orders_sum * 100).toFixed(1) : '0';
    return `${day}: заказы ${r.orders_count||0}шт/${Math.round((r.orders_sum||0)/1000)}К₽, продажи ${r.sales_count||0}шт/${Math.round((r.sales_sum||0)/1000)}К₽, реклама ${Math.round((r.ads_spend||0)/1000)}К₽, ДРР ${drr}%`;
  }).join('\n');

  const planInfo = plan.orders_plan > 0
    ? `План на месяц: заказы ${(plan.orders_plan/1000000).toFixed(1)}М₽, продажи ${(plan.sales_plan/1000000).toFixed(1)}М₽, ДРР ${plan.drr_plan}%`
    : 'План на месяц не задан';

  const firstPrompt = `Платформа: OZON (не Wildberries). Магазин: Стольников. Семена растений, аудитория — дачники и садоводы. Сейчас март — начало садового сезона, спрос растёт.\n\n${planInfo}\n\nДанные по дням:\n${tableText}`;

  aiMessages = [{ role: 'user', content: firstPrompt }];

  try {
    const text = await callWebhook(aiMessages);
    aiMessages.push({ role: 'assistant', content: text });
    renderChat();
  } catch(e) {
    body.className = 'ai-body empty';
    body.textContent = 'Ошибка: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '🔄 Обновить анализ';
}

async function sendFollowUp() {
  const input = document.getElementById('ai-followup-input');
  const sendBtn = document.getElementById('ai-followup-btn');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  aiMessages.push({ role: 'user', content: question });
  aiMessages.push({ role: 'assistant', content: 'Думаю...', typing: true });
  renderChat();

  try {
    const msgToSend = aiMessages.filter(m => !m.typing);
    const text = await callWebhook(msgToSend);
    aiMessages = aiMessages.filter(m => !m.typing);
    aiMessages.push({ role: 'assistant', content: text });
    renderChat();
  } catch(e) {
    aiMessages = aiMessages.filter(m => !m.typing);
    aiMessages.push({ role: 'assistant', content: 'Ошибка: ' + e.message });
    renderChat();
  }

  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'ai-followup-input') {
    sendFollowUp();
  }
});
</script>
